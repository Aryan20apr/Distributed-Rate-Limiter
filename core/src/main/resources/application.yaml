rate-limit:
  store: redis
  failure-mode: closed
  rules:
    - name: global-limit
      scope: GLOBAL
      algorithm: token
      capacity: 20
      refillPerSecond: 10

    - name: user-limit
      scope: USER
      algorithm: sliding-counter
      maxRequests: 10
      windowMillis: 60000

    - name: endpoint-limit
      scope: ENDPOINT
      algorithm: fixed
      maxRequests: 5
      windowMillis: 10000

    - name: user-endpoint-limit
      scope: USER_ENDPOINT
      algorithm: sliding-log
      maxRequests: 3
      windowMillis: 10000

spring:
  profiles:
    active:
    - docker
  data:
    redis:
      host: ${rate-limit.redis.host}
      port: ${rate-limit.redis.port}
      timeout: ${rate-limit.redis.timeout-millis}ms

management:
  endpoints:
    web:
      exposure:
        include: "*"