rate-limit:
  store: redis
  failure-mode: closed
  admin:
    token: ${RATE_LIMIT_ADMIN_TOKEN:rl-admin-7f3a9c2e8b1d4f6a9e0c3b5d7f2a8e1}
  redis:
    host: redis
    port: 6379
    timeout-millis: 50
  rules:
    - name: user-limit
      priority: 10
      scope: USER
      algorithm: sliding-counter
      maxRequests: 50
      windowMillis: 60000

    - name: endpoint-limit
      priority: 20
      scope: API_KEY
      algorithm: token
      capacity: 10
      refillPerSecond: 1.0
      endpointPattern: /api/**

    - name: ip-limit
      priority: 30
      scope: IP
      algorithm: sliding-counter
      maxRequests: 30
      windowMillis: 60000
    - name: global-limit
      priority: 40
      scope: GLOBAL
      algorithm: token
      capacity: 100
      refillPerSecond: 10

server:
  port: 8080
