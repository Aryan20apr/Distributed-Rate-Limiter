rate-limit:
  store: redis
  failure-mode: closed
  redis:
    host: redis
    port: 6379
    timeout-millis: 50
  rules:
    - name: user-limit
      scope: USER
      algorithm: sliding-counter
      maxRequests: 50
      windowMillis: 60000

    - name: endpoint-limit
      scope: API_KEY
      algorithm: token
      capacity: 10
      refillPerSecond: 1.0
      endpointPattern: /api/**

    - name: ip-limit
      scope: IP
      algorithm: sliding-counter
      maxRequests: 30
      windowMillis: 60000
    - name: global-limit
      scope: GLOBAL
      algorithm: token
      capacity: 100
      refillPerSecond: 10

server:
  port: 8080
